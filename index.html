<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mapa Instituciones CABA</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { 
      margin: 0; 
      font-family: Arial; 
    }

    #map { 
      width: 100%; 
      height: 100vh; 
    }

    /* =============================
       Tabla del modal
    ============================= */

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 15px;
    }

    th {
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 8px;
      border-bottom: 2px solid #222;
    }

    td {
      padding: 10px 8px;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background-color: #f7f7f7;
      transition: background 0.2s ease;
    }

    /* =============================
       Label de los barrios
    ============================= */

    .label-barrio {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #222;
      font-weight: 600;
      font-size: 13px;
      text-align: center;
      text-shadow: 0 0 4px rgba(255,255,255,0.9);
      pointer-events: none; /* no bloquea el click */
    }

    /* =============================
       Overlay
    ============================= */

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      z-index: 1000;
    }

    /* =============================
       Modal
    ============================= */

    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: none;
      z-index: 1001;
      transition: all 0.2s ease;
    }

    .modal.activo {
      transform: translate(-50%, -50%) scale(1);
    }

    .modal h2 {
      margin: 0 0 10px 0;
      font-size: 20px;
      font-weight: 700;
    }

    #cerrarModal {
      position: absolute;
      top: 10px;
      right: 15px;
      border: none;
      background: none;
      font-size: 22px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <div id="map"></div>

  <!-- Overlay -->
  <div id="overlay"></div>

  <!-- Modal -->
  <div id="modalBarrio" class="modal">
    <button id="cerrarModal">×</button>
    <div id="contenidoModal"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>
</html>
